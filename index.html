<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>CASIO</title>
  <style>
    @font-face {
      font-family: 'DSEG7';
      src: url('https://cdn.jsdelivr.net/npm/dseg@0.46.0/fonts/DSEG7-Classic/DSEG7Classic-Regular.woff2') format('woff2'),
        url('https://cdn.jsdelivr.net/npm/dseg@0.46.0/fonts/DSEG7-Classic/DSEG7Classic-Regular.woff') format('woff');
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <!-- Estilos de tema inyectados por JS -->
  <style id="theme-style"></style>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      display: -webkit-flex;
      display: flex;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: center;
      justify-content: center;
      font-family: 'Press Start 2P', monospace;
      /* 8-bit font, no anti-aliasing needed for this look */
      -webkit-font-smoothing: none;
      background-color: #000;
    }

    .watch {
      width: 96vw;
      height: 92vh;
      border-width: 4px;
      border-style: solid;
      border-color: #fff;
      /* Chunky border for 8-bit feel */
      position: relative;
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
      overflow: hidden;
      background-color: #000;
      /* Image rendering for pixel art aesthetics */
      image-rendering: pixelated;
    }

    .watch-inner {
      position: absolute;
      inset: 8px;
      border-width: 2px;
      border-style: dashed;
      /* Dashed inner border */
      border-color: #fff;
      pointer-events: none;
      z-index: 1;
    }

    /* HEADER */
    .header {
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: row;
      flex-direction: row;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: space-between;
      justify-content: space-between;
      padding: 2vh 3vw 1.5vh;
      border-bottom-width: 4px;
      border-bottom-style: solid;
      border-bottom-color: #fff;
      position: relative;
      z-index: 2;
    }

    .h-label {
      font-size: 1.5vw;
      letter-spacing: 0px;
      text-transform: uppercase;
      color: #fff;
    }

    .modes {
      display: -webkit-flex;
      display: flex;
      gap: 1.5vw;
    }

    .mode-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 1.2vw;
      cursor: pointer;
      background: none;
      border-width: 2px;
      border-style: solid;
      border-color: #fff;
      color: #fff;
      padding: 1vh 1.5vw;
      -webkit-user-select: none;
      user-select: none;
      box-shadow: 2px 2px 0px #fff;
      /* Retro drop shadow */
      margin-bottom: 2px;
    }
    .mode-btn:active {
        box-shadow: 0px 0px 0px #fff;
        transform: translate(2px, 2px);
    }

    /* HORA */
    .time-block {
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
      -webkit-align-items: center;
      align-items: center;
      -webkit-justify-content: center;
      justify-content: center;
      -webkit-flex: 1.3;
      flex: 1.3;
      border-bottom-width: 4px;
      border-bottom-style: solid;
      border-bottom-color: #fff;
      position: relative;
      z-index: 2;
      background: repeating-linear-gradient(
          0deg,
          rgba(0,0,0,0) 0px,
          rgba(0,0,0,0) 2px,
          rgba(255,255,255,0.05) 2px,
          rgba(255,255,255,0.05) 4px
      );
    }

    .lcd-wrap {
      position: relative;
      display: inline-block;
      line-height: normal;
    }

    .lcd-ghost {
      display: none; /* No ghost in 8-bit */
    }

    .lcd-real {
      font-family: 'Press Start 2P', monospace;
      font-size: 12vw;
      letter-spacing: -2px;
      position: relative;
      color: #fff;
    }

    .sep-blink {
      -webkit-animation: blink 1s step-end infinite;
      animation: blink 1s step-end infinite;
    }

    @-webkit-keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.06
      }
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.06
      }
    }

    .date-row {
      display: -webkit-flex;
      display: flex;
      gap: 3vw;
      margin-top: 2vh;
    }

    .date-chip {
      font-size: 2vw;
      letter-spacing: 0px;
      text-transform: uppercase;
    }

    /* DOS COLUMNAS */
    .bottom {
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: row;
      flex-direction: row;
      -webkit-flex: 1;
      flex: 1;
      position: relative;
      z-index: 2;
      min-height: 0;
    }

    .panel {
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
      padding: 2vh 2vw; /* Reduced from 3vw */
      overflow: hidden;
    }

    .panel-left {
      -webkit-flex: 0.85;
      flex: 0.85;
    }

    .panel-mid {
      -webkit-flex: 1;
      flex: 1;
    }

    .panel-right {
      -webkit-flex: 1.35;
      flex: 1.35;
    }

    .panel-left, .panel-mid {
      border-right-width: 4px;
      border-right-style: solid;
      border-right-color: #fff;
    }

    .panel-label {
      font-size: 1vw;
      letter-spacing: 0px;
      text-transform: uppercase;
      margin-bottom: 2vh;
      border-bottom-width: 2px;
      border-bottom-style: dashed;
      border-bottom-color: #fff;
      padding-bottom: 1vh;
      color: #fff;
    }

    /* CLIMA */
    .temp-wrap {
      position: relative;
      display: inline-block;
      line-height: normal;
    }

    .temp-ghost {
      display: none;
    }

    .temp-real {
      font-family: 'Press Start 2P', monospace;
      font-size: 4.5vw;
      letter-spacing: 0px;
      position: relative;
    }

    .temp-real sup {
      font-size: 2vw;
      vertical-align: super;
      opacity: 0.75;
      font-family: 'Share Tech Mono', 'Courier New', monospace;
    }

    .w-desc {
      margin-top: 1.5vh;
      font-size: 1.3vw;
      letter-spacing: 0px;
      text-transform: uppercase;
    }

    .w-meta {
      margin-top: 1vh;
      font-size: 1vw;
      line-height: 2;
    }

    /* STRAVA */
    .st-metric {
      margin-bottom: 2vh;
    }
    .st-label {
      font-size: 1vw;
      margin-bottom: 1vh;
      text-transform: uppercase;
    }
    .st-val {
      font-size: 1.8vw;
    }
    .st-unit {
      font-size: 1vw;
      margin-left: 0.5vw;
    }
    .st-text {
      font-size: 1.1vw;
      line-height: 1.5;
    }
    .st-bar-wrap {
      width: 100%;
      height: 2vh;
      border-width: 4px;
      border-style: solid;
      padding: 0;
      margin-top: 0.5vh;
    }
    .st-bar {
      height: 100%;
    }

    /* AGENDA */
    .ev-list {
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
      gap: 1.5vh;
      overflow: hidden;
    }

    .ev {
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: column;
      flex-direction: column;
      gap: 1vh;
      padding: 1.5vh 2vw;
      border-width: 4px;
      border-style: solid;
      background: #000;
      /* Box shadow for a slight retro lift */
      box-shadow: 4px 4px 0px rgba(255,255,255,0.1);
    }

    .ev-meta {
      display: -webkit-flex;
      display: flex;
      -webkit-flex-direction: row;
      flex-direction: row;
      -webkit-align-items: center;
      align-items: center;
      gap: 1.5vw;
    }

    .ev-date {
      font-size: 1.1vw;
      -webkit-flex-shrink: 0;
      flex-shrink: 0;
      min-width: 5vw;
      letter-spacing: 0px;
    }

    .ev-time {
      font-size: 1.1vw;
      -webkit-flex-shrink: 0;
      flex-shrink: 0;
      letter-spacing: 0px;
    }

    .ev-cal {
      font-size: 1vw;
      letter-spacing: 0px;
      margin-left: auto;
      -webkit-flex-shrink: 0;
      flex-shrink: 0;
      text-align: right;
    }

    .ev-title {
      font-size: 1.3vw;
      letter-spacing: 0px;
      white-space: normal;
      word-break: break-word;
      line-height: 1.5;
    }

    .msg {
      font-size: 1.5vw;
      letter-spacing: 0px;
      text-transform: uppercase;
    }
  </style>
</head>

<body>
  <div class="watch" id="watch">
    <div class="watch-inner" id="watch-inner"></div>

    <div class="header" id="header">
      <span class="h-label" id="h-left">&#9679; CASIO &nbsp;&#183;&nbsp; WORLD TIME</span>
      <span class="h-label" id="seconds">--</span>
      <div class="modes">
        <button class="mode-btn" id="btn-green" onclick="setTheme('green')">GRN</button>
        <button class="mode-btn" id="btn-blue" onclick="setTheme('blue')">BLU</button>
        <button class="mode-btn" id="btn-mono" onclick="setTheme('mono')">B&amp;W</button>
      </div>
    </div>

    <div class="time-block" id="time-block">
      <div class="lcd-wrap">
        <div class="lcd-ghost" id="clock-ghost">88<span>:</span>88</div>
        <div class="lcd-real" id="clock-real">00<span class="sep-blink">:</span>00</div>
      </div>
      <div class="date-row">
        <div class="date-chip" id="date-day">DOM</div>
        <div class="date-chip" id="date-full">--</div>
      </div>
    </div>

    <div class="bottom">
      <div class="panel panel-left" id="panel-left">
        <div class="panel-label" id="panel-label-left">&#9650; WEATHER / COR</div>
        <div id="weather-section">
          <div class="msg" id="w-msg">LOADING_</div>
        </div>
      </div>
      <div class="panel panel-mid" id="panel-mid">
        <div class="panel-label" id="panel-label-mid">&#9670; STRAVA DATA</div>
        <div id="strava-section">
          <div class="msg" id="st-msg">LOADING_</div>
        </div>
      </div>
      <div class="panel" id="panel-right">
        <div class="panel-label" id="panel-label-right">&#9632; SCHEDULE &#8212; NEXT 7 DAYS</div>
        <div class="ev-list" id="agenda-list">
          <div class="msg">LOADING_</div>
        </div>
      </div>
    </div>

    <!-- Password overlay -->
    <div id="pass-overlay"
      style="display:none;position:absolute;inset:0;z-index:100;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;gap:12px;">
      <div id="pass-label" style="font-family:'Press Start 2P',monospace;font-size:3vw;letter-spacing:0px;">ENTER
        PASSWORD</div>
      <input id="pass-input" type="password" autocomplete="off" onkeydown="if(event.keyCode===13)submitPass();"
        style="background:transparent;border-width:4px;border-style:solid;border-radius:0px;padding:12px 14px;font-family:'Press Start 2P',monospace;font-size:3.5vw;width:50vw;text-align:center;outline:none;" />
      <div id="pass-btn"
        style="font-family:'Press Start 2P',monospace;font-size:3vw;padding:12px 24px;border-width:4px;border-style:solid;border-radius:0px;cursor:pointer;letter-spacing:0px;"
        onclick="submitPass()">OK</div>
      <div id="pass-err" style="font-size:2.5vw;opacity:0.6;min-height:1em;"></div>
    </div>
  </div>

  <script>
    var LAT = -31.4167, LON = -64.1833;
    var DIAS = ['DOM', 'LUN', 'MAR', 'MIÉ', 'JUE', 'VIE', 'SÁB'];
    var MESES = ['ENE', 'FEB', 'MAR', 'ABR', 'MAY', 'JUN', 'JUL', 'AGO', 'SEP', 'OCT', 'NOV', 'DIC'];
    var WMO = {
      0: 'CLEAR', 1: 'MOSTLY CLR', 2: 'PART CLOUD', 3: 'OVERCAST',
      45: 'FOG', 48: 'FREEZE FOG', 51: 'DRIZZLE', 53: 'DRIZZLE+', 55: 'DRIZZLE++',
      61: 'RAIN', 63: 'RAIN+', 65: 'RAIN++', 71: 'SNOW', 73: 'SNOW+', 75: 'SNOW++',
      80: 'SHOWERS', 81: 'SHOWERS+', 82: 'SHOWERS++', 85: 'SNOWFALL',
      95: 'THUNDER', 96: 'HAIL', 99: 'HAIL+'
    };

    // ── TEMAS (colores directos, sin CSS variables) ────────────
    var THEMES = {
      green: {
        bodyBg: '#000000',
        screenBg: '#0f380f', /* Game Boy dark green */
        segOn: '#8bac0f', /* Game Boy light green */
        segOff: '#306230', /* Game Boy medium green */
        segDim: '#306230',
        border: '#8bac0f',
        label: '#8bac0f',
        glow: 'rgba(0,0,0,0)', /* No glow in 8-bit */
        scanline: 'rgba(0,0,0,0.1)'
      },
      blue: {
        bodyBg: '#000000',
        screenBg: '#000055', /* C64 style blue */
        segOn: '#55ffff',
        segOff: '#0000aa',
        segDim: '#0000aa',
        border: '#55ffff',
        label: '#55ffff',
        glow: 'rgba(0,0,0,0)',
        scanline: 'rgba(0,0,0,0.1)'
      },
      mono: {
        bodyBg: '#000000',
        screenBg: '#111111',
        segOn: '#ffffff',
        segOff: '#555555',
        segDim: '#555555',
        border: '#ffffff',
        label: '#ffffff',
        glow: 'rgba(0,0,0,0)',
        scanline: 'rgba(0,0,0,0.1)'
      }
    };

    function applyTheme(t) {
      var c = THEMES[t];
      // Body
      document.body.style.backgroundColor = c.bodyBg;
      // Watch
      var w = document.getElementById('watch');
      w.style.backgroundColor = c.screenBg;
      w.style.borderColor = c.border;
      w.style.backgroundImage = 'repeating-linear-gradient(0deg,' + c.scanline + ' 0px,' + c.scanline + ' 1px,transparent 1px,transparent 3px)';
      // Inner border
      document.getElementById('watch-inner').style.borderColor = c.segOff;
      // Header
      var header = document.getElementById('header');
      header.style.borderBottomColor = c.segOff;
      colorEls('h-label', c.label);
      // Mode buttons
      var btnIds = ['green', 'blue', 'mono'];
      for (var i = 0; i < btnIds.length; i++) {
        var btn = document.getElementById('btn-' + btnIds[i]);
        if (btn) {
          btn.style.color = btnIds[i] === t ? c.segOn : c.segDim;
          btn.style.borderColor = btnIds[i] === t ? c.segDim : c.segOff;
        }
      }
      // Time block
      document.getElementById('time-block').style.borderBottomColor = c.border;
      // Clock ghost/real
      var cr = document.getElementById('clock-real');
      cr.style.color = c.segOn;
      cr.style.textShadow = 'none'; // No glow in 8-bit
      // Date chips
      colorEls('date-chip', c.segDim);
      var df = document.getElementById('date-full');
      if (df) df.style.color = c.segOn;
      // Panels
      document.getElementById('panel-left').style.borderRightColor = c.segOff;
      document.getElementById('panel-mid').style.borderRightColor = c.segOff;
      colorEls('panel-label', c.label);
      document.getElementById('panel-label-left').style.borderBottomColor = c.segOff;
      document.getElementById('panel-label-mid').style.borderBottomColor = c.segOff;
      document.getElementById('panel-label-right').style.borderBottomColor = c.segOff;
      // Strava
      applyStravaColors(c);
      // Weather
      applyWeatherColors(c);
      // Agenda
      applyAgendaColors(c);
      // Store
      window._theme = t;
      window._colors = c;
      localStorage.setItem('casio-theme', t);
    }

    function colorEls(cls, color) {
      var els = document.getElementsByClassName(cls);
      for (var i = 0; i < els.length; i++) els[i].style.color = color;
    }

    function applyStravaColors(c) {
      colorEls('st-lbl', c.segDim);
      colorEls('st-v', c.segOn);
      colorEls('st-u', c.label);
      colorEls('st-t', c.segOn);
      var wbs = document.getElementsByClassName('st-bw');
      for(var i=0; i<wbs.length; i++) wbs[i].style.borderColor = c.segOff;
      var sb = document.getElementsByClassName('st-b');
      for(var i=0; i<sb.length; i++) sb[i].style.backgroundColor = c.segOn;
      var msg = document.getElementById('st-msg');
      if (msg) msg.style.color = c.segDim;
    }

function applyWeatherColors(c) {
      var tg = document.querySelector('.temp-ghost');
      var tr = document.querySelector('.temp-real');
      var wd = document.querySelector('.w-desc');
      var wm = document.querySelector('.w-meta');
      if (tg) tg.style.color = c.segOff;
      if (tr) { tr.style.color = c.segOn; tr.style.textShadow = 'none'; }
      if (wd) wd.style.color = c.segDim;
      if (wm) { wm.style.color = c.label; colorBolds(wm, c.segOn); }
      var msg = document.getElementById('w-msg');
      if (msg) msg.style.color = c.segDim;
    }

    function applyAgendaColors(c) {
      var evs = document.getElementsByClassName('ev');
      for (var i = 0; i < evs.length; i++) evs[i].style.borderColor = c.segOff;
      colorEls('ev-date', c.segDim);
      var todays = document.getElementsByClassName('ev-date today');
      for (var i = 0; i < todays.length; i++) todays[i].style.color = c.segOn;
      colorEls('ev-time', c.label);
      colorEls('ev-title', c.segOn);
      colorEls('ev-cal', c.label);
      colorEls('msg', c.segDim);
    }

    function colorBolds(el, color) {
      var bs = el.getElementsByTagName('b');
      for (var i = 0; i < bs.length; i++) bs[i].style.color = color;
    }

    function setTheme(t) { applyTheme(t); }

    // ── RELOJ ─────────────────────────────────────────────────
    function pad(n) { return n < 10 ? '0' + n : '' + n; }

    function updateClock() {
      var now = new Date();
      document.getElementById('clock-real').innerHTML =
        pad(now.getHours()) + '<span class="sep-blink">:</span>' + pad(now.getMinutes());
      document.getElementById('seconds').textContent = pad(now.getSeconds());
      document.getElementById('date-day').textContent = DIAS[now.getDay()];
      document.getElementById('date-full').textContent =
        pad(now.getDate()) + '-' + MESES[now.getMonth()] + '-' + now.getFullYear();
      // Re-aplicar color de fecha
      if (window._colors) {
        document.getElementById('date-day').style.color = window._colors.segDim;
        document.getElementById('date-full').style.color = window._colors.segOn;
        var cr = document.getElementById('clock-real');
        cr.style.color = window._colors.segOn;
        cr.style.textShadow = 'none';
        document.getElementById('seconds').style.color = window._colors.label;
      }
    }

    // ── CLIMA ─────────────────────────────────────────────────
    function fetchWeather() {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', '/api/weather?lat=' + LAT + '&lon=' + LON, true);
      xhr.onreadystatechange = function () {
        if (xhr.readyState !== 4) return;
        var el = document.getElementById('weather-section');
        var c = window._colors || THEMES.green;
        if (xhr.status === 200) {
          try {
            var d = JSON.parse(xhr.responseText), cw = d.current_weather;
            var h = new Date().getHours();
            var temp = Math.round(cw.temperature);
            var sens = Math.round(d.hourly.apparent_temperature[h] !== undefined ? d.hourly.apparent_temperature[h] : temp);
            var hum = d.hourly.relativehumidity_2m[h] !== undefined ? d.hourly.relativehumidity_2m[h] : '--';
            var wind = Math.round(cw.windspeed);
            el.innerHTML =
              '<div class="temp-wrap">' +
              '<div class="temp-real" style="color:' + c.segOn + ';text-shadow:none">' + temp + '<sup>°C</sup></div>' +
              '</div>' +
              '<div class="w-desc" style="color:' + c.segDim + '">' + (WMO[cw.weathercode] || '--') + '</div>' +
              '<div class="w-meta" style="color:' + c.label + '">FEEL <b style="color:' + c.segOn + '">' + sens + '°</b> &nbsp; HUM <b style="color:' + c.segOn + '">' + hum + '%</b><br>WIND <b style="color:' + c.segOn + '">' + wind + ' KM/H</b></div>';
          } catch (e) { el.innerHTML = '<div class="msg" style="color:' + c.segDim + '">NO DATA_</div>'; }
        } else { el.innerHTML = '<div class="msg" style="color:' + c.segDim + '">NO DATA_</div>'; }
      };
      xhr.send();
    }

    // ── STRAVA ─────────────────────────────────────────────────
    function fetchStrava() {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', '/api/strava', true);
      xhr.onreadystatechange = function () {
        if (xhr.readyState !== 4) return;
        var el = document.getElementById('strava-section');
        var c = window._colors || THEMES.green;
        if (xhr.status === 200) {
          try {
            var data = JSON.parse(xhr.responseText);
            var gearHtml = '';
            if (data.gear && data.gear.length > 0) {
              var shoe = data.gear.find(function(g) { return g.type === 'shoe' && g.primary; }) || data.gear.find(function(g) { return g.type === 'shoe'; });
              if (shoe) {
                gearHtml = '<div class="st-metric">' +
                  '<div class="st-label st-lbl" style="color:' + c.segDim + '">SHOES</div>' +
                  '<div class="st-text st-t" style="color:' + c.segOn + '">' + esc(shoe.name.toUpperCase()) + ' (' + Math.round(shoe.distance) + 'K)</div>' +
                  '</div>';
              }
            }
            
            var lastActHtml = '';
            if (data.lastActivity) {
               lastActHtml = '<div class="st-metric">' +
                 '<div class="st-label st-lbl" style="color:' + c.segDim + '">LAST ACT</div>' +
                 '<div class="st-text st-t" style="color:' + c.segOn + '">' + esc(data.lastActivity.name.toUpperCase()) + ' ' + Math.round(data.lastActivity.distance) + 'K</div>' +
                 '</div>';
            }

            var goal = 50.0;
            var pct = Math.min(100, Math.round((parseFloat(data.weeklyKm) / goal) * 100));

            el.innerHTML = 
              '<div class="st-metric">' +
                '<div class="st-label st-lbl" style="color:' + c.segDim + '">WK DISTANCE</div>' +
                '<div class="st-val st-v" style="color:' + c.segOn + '">' + data.weeklyKm + '<span class="st-unit st-u" style="color:' + c.label + '">KM</span></div>' +
              '</div>' +
              '<div class="st-metric">' +
                '<div class="st-label st-lbl" style="color:' + c.segDim + '">WEEKLY GOAL (' + goal + 'K)</div>' +
                '<div class="st-bar-wrap st-bw" style="border-color:' + c.segOff + '">' +
                  '<div class="st-bar st-b" style="width: ' + pct + '%; background-color:' + c.segOn + ';"></div>' +
                '</div>' +
              '</div>' +
              lastActHtml +
              gearHtml;

          } catch (e) {
             el.innerHTML = '<div class="msg" id="st-msg" style="color:' + c.segDim + '">NO DATA_</div>';
          }
        } else {
             el.innerHTML = '<div class="msg" id="st-msg" style="color:' + c.segDim + '">NO CONN_</div>';
        }
      };
      xhr.send();
    }

    // ── AGENDA ────────────────────────────────────────────────
    var todayISO = '';
    function fetchAgenda() {
      var xhr = new XMLHttpRequest();
      var dashSecret = localStorage.getItem('dash-secret') || '';
      xhr.open('GET', '/api/calendar' + (dashSecret ? '?secret=' + encodeURIComponent(dashSecret) : ''), true);
      xhr.onreadystatechange = function () {
        if (xhr.readyState !== 4) return;
        var list = document.getElementById('agenda-list');
        var c = window._colors || THEMES.green;
        if (xhr.status === 200) {
          try {
            var data = JSON.parse(xhr.responseText);
            todayISO = data.today || '';
            if (!data.events || data.events.length === 0) {
              list.innerHTML = '<div class="msg" style="color:' + c.segDim + '">NO EVENTS_</div>'; return;
            }
            var html = '';
            for (var i = 0; i < data.events.length; i++) {
              var ev = data.events[i];
              var isToday = ev.date === todayISO;
              var dateLabel = isToday ? 'HOY' : ev.dayLabel + ' ' + ev.dateNum;
              var timeStr = ev.allDay ? 'ALL DAY' : (ev.start + (ev.end ? ' > ' + ev.end : ''));
              var dateColor = isToday ? c.segOn : c.segDim;
              html += '<div class="ev" style="border-color:' + c.segOff + '">' +
                '<div class="ev-meta">' +
                '<span class="ev-date" style="color:' + dateColor + '">' + esc(dateLabel) + '</span>' +
                '<span class="ev-time" style="color:' + c.label + '">' + timeStr + '</span>' +
                '<span class="ev-cal"  style="color:' + c.label + '">' + esc(ev.calendar.toUpperCase()) + '</span>' +
                '</div>' +
                '<div class="ev-title" style="color:' + c.segOn + '">' + esc(ev.title.toUpperCase()) + '</div>' +
                '</div>';
            }
            list.innerHTML = html;
          } catch (e) { list.innerHTML = '<div class="msg" style="color:' + c.segDim + '">ERR_</div>'; }
        } else if (xhr.status === 401) {
          showPassOverlay();
        } else { list.innerHTML = '<div class="msg" style="color:' + c.segDim + '">NO CONN_</div>'; }
      };
      xhr.send();
    }

    function showPassOverlay() {
      var overlay = document.getElementById('pass-overlay');
      var c = window._colors || THEMES.green;
      overlay.style.background = c.bg;
      overlay.style.display = '-webkit-flex';
      overlay.style.display = 'flex';
      document.getElementById('pass-label').style.color = c.segOn;
      document.getElementById('pass-input').style.color = c.segOn;
      document.getElementById('pass-input').style.borderColor = c.segDim;
      document.getElementById('pass-btn').style.color = c.segOn;
      document.getElementById('pass-btn').style.borderColor = c.segDim;
      document.getElementById('pass-err').style.color = c.segDim;
      document.getElementById('pass-err').innerHTML = '';
      document.getElementById('pass-input').value = '';
      document.getElementById('pass-input').focus();
    }

    function submitPass() {
      var val = document.getElementById('pass-input').value;
      if (!val) return;
      localStorage.setItem('dash-secret', val);
      document.getElementById('pass-overlay').style.display = 'none';
      document.getElementById('agenda-list').innerHTML = '<div class="msg">LOADING_</div>';
      fetchAgenda();
    }

    function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

    // ── INIT ──────────────────────────────────────────────────
    var savedTheme = localStorage.getItem('casio-theme') || 'green';
    applyTheme(savedTheme);

    updateClock();
    setInterval(updateClock, 1000);
    fetchWeather();
    setInterval(fetchWeather, 10 * 60 * 1000);
    fetchStrava();
    setInterval(fetchStrava, 15 * 60 * 1000);
    fetchAgenda();
    setInterval(fetchAgenda, 15 * 60 * 1000);
    document.addEventListener('touchstart', function () { }, false);
  </script>
</body>

</html>
